<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Analytics Premium — Management Report</title>

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

    <style>
        :root {
            --bg: #030712;
            --surface: #0f172a;
            --surface-glass: rgba(15, 23, 42, 0.75);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(30, 41, 59, 1);
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.15);
            --secondary: #0ea5e9;
            --accent: #f59e0b;
            --danger: #ef4444;
            --header-grad: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
        }

        .light-mode {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.7);
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: rgba(226, 232, 240, 1);
            --header-grad: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'DM Mono', monospace;
        }

        .container {
            max-width: 1540px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .glass {
            background: var(--surface-glass);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .section-header {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            padding-left: 12px;
            border-left: 4px solid var(--primary);
        }

        .metric-title {
            font-size: 11px;
            font-weight: 900;
            color: var(--text-sub);
            margin-bottom: 4px;
            display: block;
        }

        .metric-sub {
            font-size: 10px;
            color: var(--text-sub);
            opacity: 0.8;
            margin-bottom: 12px;
            display: block;
            line-height: 1.4;
        }

        .btn-premium {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-premium:hover {
            border-color: var(--primary);
            background: var(--primary-glow);
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            border: none;
        }

        .select-premium {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 10px;
            font-weight: 800;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        td {
            padding: 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        tr td:first-child {
            border-left: 1px solid var(--border);
            border-radius: 12px 0 0 12px;
        }

        tr td:last-child {
            border-right: 1px solid var(--border);
            border-radius: 0 12px 12px 0;
        }

        /* Dropdown Styles */
        .dropdown-container {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 240px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            padding: 8px;
            display: none;
        }

        .dropdown-menu.show {
            display: block;
            animation: fadeIn 0.2s ease-out;
        }

        .dropdown-item {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            text-decoration: none;
            border: none;
            background: none;
            width: 100%;
        }

        .dropdown-item:hover {
            background: var(--primary-glow);
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0;
        }

        .dropdown-item i {
            font-style: normal;
        }

        @media print {
            body {
                background: white !important;
                color: black !important;
            }

            .no-print {
                display: none !important;
            }

            .glass {
                background: white !important;
                border: 1px solid #ddd !important;
                box-shadow: none !important;
                -webkit-backdrop-filter: none !important;
                backdrop-filter: none !important;
                color: black !important;
            }

            .container {
                max-width: 100% !important;
                padding: 0 !important;
            }

            header {
                background: #10b981 !important;
                color: white !important;
                padding: 20px !important;
                margin-bottom: 40px !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: flex-start !important;
            }

            .print-header-info {
                display: block !important;
                margin-top: 10px;
                font-size: 14px;
                font-weight: 700;
                background: rgba(0, 0, 0, 0.1);
                padding: 8px 16px;
                border-radius: 8px;
            }

            h1,
            h3 {
                color: black !important;
            }

            header h1 {
                color: white !important;
            }

            .grid-main {
                gap: 10px !important;
                margin-top: 0 !important;
            }

            .col-4,
            .col-6,
            .col-8,
            .col-12 {
                grid-column: span 12 !important;
                page-break-inside: avoid;
            }

            td {
                background: white !important;
                border: 1px solid #eee !important;
                color: black !important;
            }

            .section-header {
                border-left: 4px solid #10b981 !important;
                color: #555 !important;
            }

            .metric-sub {
                color: #666 !important;
            }
        }

        .print-only {
            display: none;
        }

        @media print {
            .print-only {
                display: block;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const {
            AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid,
            Tooltip, Legend, ResponsiveContainer, ComposedChart, Line
        } = Recharts;

        const COLOR_PALETTE = ["#10b981", "#0ea5e9", "#f59e0b", "#6366f1", "#ec4899", "#8b5cf6"];

        const fmt = v => new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v || 0);

        function App() {
            const [isDark, setIsDark] = useState(true);
            const [dadosJson, setDadosJson] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filtroUnidade, setFiltroUnidade] = useState("todas");
            const [showExport, setShowExport] = useState(false);
            const [abertoId, setAbertoId] = useState(null); // ID do mês aberto para composição
            const exportRef = useRef(null);
            const COLOR_PALETTE = ["#10b981", "#0ea5e9", "#f59e0b", "#6366f1", "#ec4899", "#8b5cf6"];

            // Calcula dinamicamente as informações das unidades baseadas no JSON carregado
            const unidadesInfo = useMemo(() => {
                if (!dadosJson || !dadosJson.unidades) return {};
                const info = {};
                Object.keys(dadosJson.unidades).forEach((uc, index) => {
                    info[uc] = {
                        nome: dadosJson.unidades[uc].responsavel || uc,
                        cor: COLOR_PALETTE[index % COLOR_PALETTE.length],
                        quota: dadosJson.unidades[uc].proporcao || 0
                    };
                });
                return info;
            }, [dadosJson]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (exportRef.current && !exportRef.current.contains(event.target)) {
                        setShowExport(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                fetch(`dados_faturas.json?v=${Date.now()}`)
                    .then(r => r.json())
                    .then(d => { setDadosJson(d); setLoading(false); })
                    .catch(e => { setError(e.message); setLoading(false); });
            }, []);

            const toggleTheme = () => {
                setIsDark(!isDark);
                document.body.classList.toggle("light-mode");
            };

            const exportCSV = () => {
                const headers = ["UC", "Responsavel", "Referencia", "kWh", "Pago", "Recuperado"];
                const rows = allFaturas.map(f => [f.uc, unidadesInfo[f.uc]?.nome, f.mes, f.kwh_faturado, f.valor_pago, f.credito_reais]);
                const csvContent = "data:text/csv;charset=utf-8," + [headers, ...rows].map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csvContent));
                link.setAttribute("download", "relatorio_solar.csv");
                link.click();
            };

            const exportXML = () => {
                let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<SolarReport>\n';
                allFaturas.forEach(f => {
                    xml += `  <Invoice>\n    <UC>${f.uc}</UC>\n    <Beneficiary>${unidadesInfo[f.uc]?.nome}</Beneficiary>\n    <Month>${f.mes}</Month>\n    <kWh>${f.kwh_faturado}</kWh>\n    <Recovered>${f.credito_reais}</Recovered>\n  </Invoice>\n`;
                });
                xml += '</SolarReport>';
                const blob = new Blob([xml], { type: 'text/xml' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "relatorio_solar.xml";
                link.click();
            };

            const allFaturas = useMemo(() => {
                if (!dadosJson || !dadosJson.unidades) return [];
                const list = [];
                Object.entries(dadosJson.unidades).forEach(([uc, u]) => {
                    (u.faturas || []).forEach(f => {
                        // Garantir que os valores são números e não strings
                        const kwh = parseFloat(f.kwh_faturado || 0);
                        const pago = parseFloat(f.valor_pago || 0);
                        let recuperado = parseFloat(f.credito_reais || 0);

                        // Fallback de segurança: se temos kWh de crédito mas o valor em R$ está zerado
                        if (recuperado === 0 && (f.credito_kwh > 0)) {
                            recuperado = f.credito_kwh * 0.95;
                        }

                        list.push({
                            ...f,
                            uc,
                            kwh_faturado: kwh,
                            valor_pago: pago,
                            credito_reais: recuperado
                        });
                    });
                });
                return list.sort((a, b) => b.referencia.localeCompare(a.referencia));
            }, [dadosJson]);

            const stats = useMemo(() => {
                if (!dadosJson) return null;
                const filteredAll = allFaturas.filter(f => filtroUnidade === "todas" || f.uc === filtroUnidade);
                const investimento = parseFloat(dadosJson.investimento_total || 0);
                const totalRecuperado = filteredAll.reduce((acc, f) => acc + (f.credito_reais || 0), 0);
                const totalConsumo = filteredAll.reduce((acc, f) => acc + (f.kwh_faturado || 0), 0);
                const mesesCount = [...new Set(filteredAll.map(f => f.mes))].length;
                const mediaMensal = totalRecuperado / (mesesCount || 1);
                return { investimento, totalRecuperado, totalConsumo, mediaMensal };
            }, [allFaturas, filtroUnidade, dadosJson]);

            const resumoMensal = useMemo(() => {
                const map = {};
                const filteredAll = allFaturas.filter(f => filtroUnidade === "todas" || f.uc === filtroUnidade);

                filteredAll.forEach(f => {
                    const ref = f.referencia || f.mes.split('/').reverse().join('-');
                    if (!map[ref]) map[ref] = { mes: f.mes, referencia: ref, recuperado: 0, consumo: 0, pago: 0, bruto: 0, detalhes: [] };

                    const unitRecovery = (f.credito_reais || 0);
                    map[ref].recuperado += unitRecovery;
                    map[ref].consumo += (f.kwh_faturado || 0);
                    map[ref].pago += (f.valor_pago || 0);
                    map[ref].bruto += (f.valor_sem_solar || 0);
                    map[ref].detalhes.push({
                        nome: unidadesInfo[f.uc]?.nome || f.uc,
                        cor: unidadesInfo[f.uc]?.cor || '#888',
                        kwh: f.kwh_faturado,
                        pago: f.valor_pago,
                        bruto: f.valor_sem_solar,
                        recuperado: unitRecovery,
                        fonte: f.fonte
                    });
                });

                return Object.values(map).sort((a, b) => b.referencia.localeCompare(a.referencia));
            }, [allFaturas, filtroUnidade, unidadesInfo]);

            const projecao = useMemo(() => {
                if (!stats || allFaturas.length === 0) return null;

                const contribuicaoPorUnidade = {};
                const mesesRef = [...new Set(allFaturas.map(f => f.referencia))];
                const mesesCount = mesesRef.length || 1;

                Object.keys(unidadesInfo).forEach((uc) => {
                    const realUc = allFaturas
                        .filter(f => f.uc === uc)
                        .reduce((acc, f) => acc + (f.credito_reais || 0), 0);

                    contribuicaoPorUnidade[uc] = realUc;
                });

                const totalEstimado = Object.values(contribuicaoPorUnidade).reduce((a, b) => a + b, 0);
                const saldoPendente = Math.max(0, stats.investimento - totalEstimado);

                const mediaMensalReal = totalEstimado / mesesCount;
                const mesesRestantes = mediaMensalReal > 0 ? Math.ceil(saldoPendente / mediaMensalReal) : 0;

                return { mesesRestantes, contribuicaoPorUnidade, totalEstimado, mediaMensalEstimada: mediaMensalReal };
            }, [stats, allFaturas]);

            if (loading) return <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#000', color: '#fff' }}>☀️ PREPARANDO INTELIGÊNCIA...</div>;

            return (
                <div>
                    <header style={{ background: "var(--header-grad)", padding: "40px 0 60px", marginBottom: "32px" }}>
                        <div className="container" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
                                <div style={{ fontSize: 40, border: '2px solid rgba(255,255,255,0.4)', borderRadius: 12, padding: 8 }}>☀️</div>
                                <div>
                                    <h1 style={{ margin: 0, fontSize: 26, fontWeight: 900, color: "#fff", letterSpacing: -0.5 }}>Solar Analytics Premium</h1>
                                    <p style={{ margin: "4px 0 0", fontSize: 11, color: "rgba(255,255,255,0.7)", fontWeight: 700, letterSpacing: 1.5 }}>GESTÃO ESTRATÉGICA E ROI DINÂMICO</p>
                                    <div className="print-header-info print-only">
                                        {filtroUnidade === "todas" ? "Relatório: VISÃO GLOBAL DA USINA" : `Relatório: ${unidadesInfo[filtroUnidade]?.nome} (UC ${filtroUnidade})`}
                                    </div>
                                </div>
                            </div>
                            <div className="no-print" style={{ display: "flex", gap: 12, alignItems: "center" }}>
                                <select className="select-premium" value={filtroUnidade} onChange={e => setFiltroUnidade(e.target.value)}>
                                    <option value="todas">Visão Global</option>
                                    {Object.entries(unidadesInfo).map(([id, info]) => <option key={id} value={id}>{info.nome}</option>)}
                                </select>

                                <div className="dropdown-container" ref={exportRef}>
                                    <button className="btn-premium btn-primary" onClick={() => setShowExport(!showExport)}>
                                        📥 Exportar / Lote &nbsp; ▼
                                    </button>
                                    <div className={`dropdown-menu ${showExport ? 'show' : ''}`}>
                                        <button className="dropdown-item" onClick={() => { window.print(); setShowExport(false); }}>
                                            <i>🖨️</i> Imprimir Vista Atual (PDF)
                                        </button>
                                        <button className="dropdown-item" onClick={async () => {
                                            try {
                                                const res = await fetch('http://localhost:8889/imprimir-lote', { method: 'POST' });
                                                const data = await res.json();
                                                alert(data.mensagem);
                                            } catch (e) {
                                                alert('Erro ao conectar com o servidor de utilidades (backend_utils.py). Certifique-se que ele está rodando na porta 8889.');
                                            }
                                            setShowExport(false);
                                        }}>
                                            <i>📂</i> <strong>Imprimir Lote (Automático)</strong>
                                        </button>
                                        <div className="dropdown-divider"></div>
                                        <button className="dropdown-item" onClick={() => { exportCSV(); setShowExport(false); }}>
                                            <i>📊</i> Exportar CSV (Vista Atual)
                                        </button>
                                        <button className="dropdown-item" onClick={() => { exportXML(); setShowExport(false); }}>
                                            <i>📄</i> Exportar XML (Vista Atual)
                                        </button>
                                    </div>
                                </div>

                                <button className="theme-toggle" onClick={toggleTheme}>{isDark ? "🌙" : "☀️"}</button>
                            </div>
                        </div>
                    </header>

                    <main className="container animate-in">
                        <div className="grid-main" style={{ marginTop: "-60px" }}>
                            <div className="col-3 glass" style={{ borderTop: '4px solid var(--primary)' }}>
                                <span className="metric-title">INVESTIMENTO TOTAL</span>
                                <span className="metric-sub">Capital total alocado para a infraestrutura da usina.</span>
                                <div style={{ fontSize: 28, fontWeight: 900 }}>{fmt(stats.investimento)}</div>
                            </div>
                            <div className="col-3 glass" style={{ borderTop: '4px solid var(--secondary)' }}>
                                <span className="metric-title">{filtroUnidade === "todas" ? "CONSUMO GLOBAL" : "CONSUMO UNIDADE"}</span>
                                <span className="metric-sub">Soma do consumo faturado no período.</span>
                                <div style={{ fontSize: 28, fontWeight: 900, color: 'var(--secondary)' }}>{stats.totalConsumo.toLocaleString()} <span style={{ fontSize: 14 }}>kWh</span></div>
                            </div>
                            <div className="col-3 glass" style={{ borderTop: '4px solid var(--primary)' }}>
                                <span className="metric-title">VALOR RECUPERADO (REAL)</span>
                                <span className="metric-sub">Economia acumulada comprovada por faturas.</span>
                                <div style={{ fontSize: 28, fontWeight: 900, color: 'var(--primary)' }}>{fmt(stats.totalRecuperado)}</div>
                            </div>
                            <div className="col-3 glass" style={{ borderTop: '4px solid var(--accent)' }}>
                                <span className="metric-title">SALDO PENDENTE (ESTIMADO)</span>
                                <span className="metric-sub">Com base na geração total proporcional.</span>
                                <div style={{ fontSize: 28, fontWeight: 900, color: 'var(--accent)' }}>{fmt(Math.max(0, stats.investimento - (projecao?.totalEstimado || stats.totalRecuperado)))}</div>
                            </div>

                            {filtroUnidade === "todas" && projecao && (
                                <div className="col-12 glass" style={{ background: 'linear-gradient(to right, var(--surface), rgba(16, 185, 129, 0.05))' }}>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.5fr', gap: 40, alignItems: 'center' }}>
                                        <div>
                                            <div className="section-header">Projeção de Payback (Break-even)</div>
                                            <div style={{ fontSize: 48, fontWeight: 900, color: 'var(--primary)', marginBottom: 8 }}>
                                                {projecao.mesesRestantes} <span style={{ fontSize: 18, color: 'var(--text-sub)' }}>meses estimados</span>
                                            </div>
                                            <p className="metric-sub" style={{ fontSize: 13 }}>
                                                Com base na média de economia total de <strong>{fmt(projecao.mediaMensalEstimada)}/mês</strong>, a usina se pagará totalmente em aproximadamente <strong>{Math.floor(projecao.mesesRestantes / 12)} anos e {projecao.mesesRestantes % 12} meses</strong>.
                                            </p>
                                        </div>
                                        <div>
                                            <div className="metric-title" style={{ marginBottom: 16 }}>CONTRIBUIÇÃO POR BENEFICIÁRIO NO RESULTADO ACUMULADO</div>
                                            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                                                {Object.entries(unidadesInfo).map(([id, info]) => {
                                                    const valor = projecao.contribuicaoPorUnidade[id] || 0;
                                                    const perc = projecao.totalEstimado > 0 ? (valor / projecao.totalEstimado) * 100 : 0;
                                                    return (
                                                        <div key={id}>
                                                            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, fontWeight: 700, marginBottom: 4 }}>
                                                                <span style={{ color: info.cor }}>● {info.nome.toUpperCase()}</span>
                                                                <span style={{ color: info.cor }}>{fmt(valor)} ({perc.toFixed(1)}%)</span>
                                                            </div>
                                                            <div style={{ height: 8, background: 'var(--border)', borderRadius: 10, overflow: 'hidden' }}>
                                                                <div style={{ width: `${perc}%`, background: info.cor, height: '100%', borderRadius: 10 }} />
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="col-12 glass">
                                <div className="section-header">Histórico de Performance Financeira</div>
                                <div style={{ height: 350, marginTop: 24 }}>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={resumoMensal.slice().reverse()}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="var(--border)" />
                                            <XAxis dataKey="mes" tick={{ fontSize: 11, fill: 'var(--text-sub)' }} />
                                            <YAxis tick={{ fontSize: 11, fill: 'var(--text-sub)' }} />
                                            <Tooltip contentStyle={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16 }} />
                                            <Area type="monotone" dataKey="recuperado" stroke="var(--primary)" strokeWidth={4} fill="var(--primary-glow)" />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="col-12 glass">
                                <div className="section-header">Consolidado Mensal da Usina</div>
                                <div style={{ overflowX: 'auto' }}>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style={{ width: '40px' }}></th>
                                                <th>Competência<div className="metric-sub">O "Quando"</div></th>
                                                <th>Consumo Útil (kWh)<div className="metric-sub">O "Quanto"</div></th>
                                                <th>Custo Bruto (Total)<div className="metric-sub">O "Valor Sem Solar"</div></th>
                                                <th>Pagar (Residual)<div className="metric-sub">Taxas Neoenergia</div></th>
                                                <th>Economia (ROI)<div className="metric-sub">Custo Evitado</div></th>
                                                <th>ROI Mensal<div className="metric-sub">A "Paga"</div></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {resumoMensal.map((m, i) => (
                                                <React.Fragment key={`${m.referencia}-${i}`}>
                                                    <tr
                                                        onClick={() => setAbertoId(abertoId === m.referencia ? null : m.referencia)}
                                                        style={{ cursor: 'pointer', transition: 'background 0.2s' }}
                                                        className={abertoId === m.referencia ? 'row-active' : ''}
                                                    >
                                                        <td style={{ textAlign: 'center', fontSize: 10 }}>{abertoId === m.referencia ? '▼' : '▶'}</td>
                                                        <td style={{ fontWeight: 800 }}>{m.mes}</td>
                                                        <td className="mono">{m.consumo} kWh</td>
                                                        <td className="mono" style={{ fontWeight: 700 }}>{fmt(m.bruto || (m.recuperado + m.pago))}</td>
                                                        <td className="mono" style={{ color: "var(--text-sub)", fontSize: '12px' }}>{fmt(m.pago)}</td>
                                                        <td className="mono" style={{ color: "var(--primary)", fontWeight: 900 }}>{fmt(m.recuperado)}</td>
                                                        <td>
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                                                <div style={{ flex: 1, background: 'var(--border)', height: 6, borderRadius: 10 }}>
                                                                    <div style={{ width: `${Math.min(100, (m.recuperado / (stats.investimento / 72)) * 100)}%`, background: 'var(--primary)', height: '100%', borderRadius: 10 }} />
                                                                </div>
                                                                <span style={{ fontSize: 11, fontWeight: 900 }}>{((m.recuperado / stats.investimento) * 100).toFixed(2)}% do Investimento Total</span>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    {abertoId === m.referencia && (
                                                        <tr>
                                                            <td colSpan="6" style={{ padding: '0 16px 16px', background: 'rgba(255,255,255,0.02)' }}>
                                                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12, paddingTop: 12 }}>
                                                                    {m.detalhes && m.detalhes.length > 0 ? m.detalhes.map((det, idx) => (
                                                                        <div key={`${m.referencia}-det-${idx}`} style={{ background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 12, padding: 12, borderLeft: `4px solid ${det.cor}` }}>
                                                                            <div style={{ fontSize: 13, fontWeight: 800, marginBottom: 4, display: 'flex', justifyContent: 'space-between' }}>
                                                                                <span>{det.nome}</span>
                                                                                <span style={{ color: 'var(--primary)' }}>{fmt(det.recuperado)}</span>
                                                                            </div>
                                                                            <div style={{ fontSize: 9, fontWeight: 700, color: 'var(--text-sub)', marginBottom: 8, opacity: 0.6 }}>
                                                                                FONTE: {det.fonte?.toUpperCase() || "SEED"}
                                                                            </div>
                                                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                                                                                <div>
                                                                                    <span className="metric-title">CONSUMO</span>
                                                                                    <span className="mono" style={{ fontSize: 11 }}>{det.kwh} kWh</span>
                                                                                </div>
                                                                                <div>
                                                                                    <span className="metric-title">VALOR PAGO</span>
                                                                                    <span className="mono" style={{ fontSize: 11 }}>{fmt(det.pago)}</span>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    )) : (
                                                                        <div style={{ padding: 12, color: 'var(--text-sub)', fontSize: 12 }}>Nenhuma composição disponível para este mês.</div>
                                                                    )}
                                                                </div>

                                                                {/* Linha de Conferência */}
                                                                <div style={{ marginTop: 16, padding: '12px 20px', background: 'var(--surface)', borderRadius: 12, border: '1px dashed var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-sub)' }}>SOMA DAS UNIDADES (CONFERÊNCIA):</span>
                                                                    <div style={{ display: 'flex', gap: 24 }}>
                                                                        <div className="mono" style={{ fontSize: 13 }}>
                                                                            <span style={{ color: 'var(--text-sub)', marginRight: 8 }}>Consumo:</span>{m.detalhes.reduce((acc, d) => acc + (d.kwh || 0), 0)} kWh
                                                                        </div>
                                                                        <div className="mono" style={{ fontSize: 13 }}>
                                                                            <span style={{ color: 'var(--text-sub)', marginRight: 8 }}>Recuperado:</span>
                                                                            <span style={{ color: 'var(--primary)', fontWeight: 800 }}>{fmt(m.detalhes.reduce((acc, d) => acc + (d.recuperado || 0), 0))}</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </React.Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                    <style>{`
                        tr.row-active td { background: var(--primary-glow) !important; border-color: var(--primary) !important; }
                        tr:hover td { background: rgba(16, 185, 129, 0.05); }
                    `}</style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
